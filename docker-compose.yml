version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: collab-board-postgres
    environment:
      POSTGRES_DB: collab_board
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - collab-network

  redis:
    image: redis:7-alpine
    container_name: collab-board-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - collab-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: collab-board-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/collab_board
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - collab-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: collab-board-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - collab-network

volumes:
  postgres_data:
  redis_data:

networks:
  collab-network:
    driver: bridge
