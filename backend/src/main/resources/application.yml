spring:
  application:
    name: collab-board-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/collab_board
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  jwt:
    secret: collab-board-super-secret-key-for-jwt-token-generation-please-change-in-production
    expiration: 86400000
  version:
    auto-save-interval: 30000

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.collabboard: DEBUG
    org.springframework.web.socket: DEBUG
